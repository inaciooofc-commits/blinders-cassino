<body data-page="mod020-chat">

<main class="app">
  <div class="top">
    <div class="icon-row"><img class="brand-icon" src="/assets/ui/icons/bell.svg"><div><h1>Chat</h1><p>Chat global e amigos por ID único.</p></div></div>
    <a class="btn ghost" href="/member/start.html">Lobby</a>
  </div>

  <section class="mod020-chat-layout">
    <aside class="box">
      <h2>Meu ID único</h2>
      <p class="mod0-code" id="myFriendId">Carregando...</p>

      <form id="friendForm">
        <h2>Adicionar amigo</h2>
        <label>ID único do amigo<input name="friendCode" required placeholder="FR-..."></label>
        <button class="btn" type="submit">Adicionar</button>
      </form>

      <h2>Amigos</h2>
      <section id="friendList" class="grid"></section>
      <div id="statusBox" class="status"></div>
    </aside>

    <section class="box">
      <h2>Chat global</h2>
      <div id="chatBox" class="mod020-chat-box"></div>
      <form id="chatForm">
        <label>Mensagem<input name="body" required maxlength="500" placeholder="Digite sua mensagem..."></label>
        <button class="btn" type="submit">Enviar</button>
      </form>
    </section>
  </section>
</main>
