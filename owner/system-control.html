<body data-page="mod020-admin-system">

<main class="app">
  <div class="top">
    <div><h1>Sistema</h1><p>Lock, manutenção e gatilhos instantâneos.</p></div>
    <a class="btn ghost" href="/owner/admin-menu.html" data-admin-only>Menu ADM</a>
  </div>

  <section class="mod020-admin-switches">
    <article class="card mod020-admin-switch">
      <h2>Lock</h2>
      <p>Quando ativo, membros comuns não conseguem fazer login. Admins continuam entrando pelo painel admin.</p>
      <div class="actions">
        <button class="btn" id="lockBtn">Ativar Lock</button>
        <button class="btn ghost" id="unlockBtn">Desativar agora</button>
      </div>
    </article>

    <form class="card mod020-admin-switch" id="maintForm">
      <h2>Manutenção</h2>
      <p>Bloqueia login comum e mostra mensagem personalizada.</p>
      <label>Mensagem para membros<textarea name="message" class="mod020-maintenance-message" placeholder="Estamos em manutenção. Voltamos em breve."></textarea></label>
      <div class="actions">
        <button class="btn" type="submit">Ativar manutenção</button>
        <button class="btn ghost" type="button" id="offMaint">Desativar agora</button>
      </div>
    </form>
  </section>

  <section id="stateBox" class="grid"></section>
  <div id="statusBox" class="status"></div>
</main>
