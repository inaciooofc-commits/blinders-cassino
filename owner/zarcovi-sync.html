<body data-page="zarcovi-live-sync">

<main class="app">
  <div class="top">
    <div>
      <h1>Zarcovi Sync</h1>
      <p>Sincronização silenciosa dos saldos Zarcovi e do Banco EMSHBY.</p>
    </div>
    <a class="btn ghost" href="/owner/official-dashboard.html" data-admin-only>Painel oficial</a>
  </div>

  <section class="zarcovi-sync-grid">
    <section class="box">
      <h2>Fonte da planilha</h2>
      <p class="stable-clean-note">Para atualização automática, a planilha precisa estar publicada/visível como CSV. Se não estiver, cole o CSV manualmente.</p>
      <label>URL CSV da planilha<input id="zarcoviSourceUrl" placeholder="URL CSV publicada do Google Planilhas"></label>
      <div class="zarcovi-sync-actions">
        <button class="btn" id="saveSourceBtn">Salvar fonte</button>
        <button class="btn" id="syncNowBtn">Sincronizar agora</button>
        <button class="btn ghost" id="monitorBtn">Ativar monitor 60s</button>
        <button class="btn ghost" id="applyEmshbyBtn">Aplicar EMSHBY no cofre</button>
      </div>
      <div id="statusBox" class="status"></div>
    </section>

    <section class="box zarcovi-source-box">
      <h2>Importar por CSV colado</h2>
      <textarea id="zarcoviCsvPaste" placeholder="Cole aqui o CSV exportado da planilha, caso a leitura automática não funcione."></textarea>
      <button class="btn" id="syncPasteBtn">Importar CSV colado</button>
    </section>
  </section>

  <section class="box" style="width:100%;margin-top:14px">
    <h2>Status / Diagnóstico</h2>
    <pre class="status zarcovi-sync-log" id="zarcoviLog">Carregando...</pre>
  </section>
</main>
