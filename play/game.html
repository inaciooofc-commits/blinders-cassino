<body data-page="real-game">

<main class="app">
  <div class="top">
    <div>
      <h1 id="realGameTitle">Jogo</h1>
      <p>Agora é jogo real: você joga a rodada, toma decisões e o resultado nasce da partida.</p>
    </div>
    <a class="btn ghost" href="/play/index.html">Voltar</a>
  </div>

  <section class="real-game-layout">
    <article class="card real-game-board" id="realBoard">
      <div class="real-game-inside">
        <h2>Preparar partida</h2>
        <p>Defina a aposta para liberar o tabuleiro.</p>
      </div>
    </article>

    <aside class="box" id="realPanel">
      <form id="realStartForm">
        <h2>Aposta</h2>
        <p class="official-warning">O banco valida saldo, limite do jogo e cofre EMSHBY antes de iniciar.</p>
        <label>Valor da aposta (mín. 1500B / máx. 3T)<input name="amount" required placeholder="1500B ou 3T"></label>
        <button class="btn" type="submit">Iniciar jogo real</button>
      </form>

      <section class="real-game-actions" id="realActions"></section>
      <div class="real-result" id="realResult"></div>

      <h2>Registro da partida</h2>
      <div class="real-game-log" id="realLog"></div>
      <div id="statusBox" class="status"></div>
    </aside>
  </section>
</main>
